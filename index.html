<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>气相色谱快速抢答PK赛</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            margin: 0;
            padding: 0;
        }
        body {
            background: linear-gradient(145deg, #0b1a2e 0%, #1a2f44 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            margin: 0;
        }
        .game-container {
            max-width: 880px;
            width: 100%;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(4px);
            border-radius: 48px;
            padding: 24px 20px 32px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.03);
        }
        h1 {
            font-size: 1.7rem;
            font-weight: 700;
            color: #f0e9d8;
            text-shadow: 0 4px 8px rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
            flex-wrap: wrap;
            gap: 8px;
        }
        h1 small {
            font-size: 0.75rem;
            background: #2d4b63;
            padding: 6px 16px;
            border-radius: 60px;
            color: #cfecff;
            font-weight: 400;
            letter-spacing: 0.5px;
        }
        .role-switch {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            justify-content: center;
        }
        .role-btn {
            padding: 10px 24px;
            border-radius: 60px;
            border: 2px solid #3a5a78;
            background: #1d344b;
            color: #8ab3d9;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
        }
        .role-btn.active {
            background: #6ba6d9;
            border-color: #f5b042;
            color: #1a2f44;
        }
        .status-bar {
            display: flex;
            justify-content: space-between;
            background: #132433cc;
            border-radius: 60px;
            padding: 10px 20px;
            margin-bottom: 16px;
            color: #b4d0e6;
            border: 1px solid #3a5a78;
            flex-wrap: wrap;
            gap: 6px 12px;
            backdrop-filter: blur(4px);
        }
        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.88rem;
        }
        .status-item span {
            background: #1d344b;
            padding: 2px 14px;
            border-radius: 40px;
            color: #e5f0ff;
            font-weight: 600;
        }
        .question-panel {
            background: #1d3348dd;
            border-radius: 32px;
            padding: 24px 20px;
            margin-bottom: 16px;
            border-left: 6px solid #6ba6d9;
            box-shadow: 0 8px 0 #0f1e2e;
            backdrop-filter: blur(2px);
        }
        .question-text {
            font-size: 1.25rem;
            font-weight: 600;
            color: #f2f6fc;
            margin-bottom: 20px;
            line-height: 1.6;
            min-height: 4rem;
        }
        .options {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
        }
        .option-btn {
            background: #273f58;
            border: none;
            border-radius: 60px;
            padding: 14px 8px;
            font-weight: 600;
            color: #d6e6fa;
            font-size: 0.95rem;
            box-shadow: 0 4px 0 #0e1b28;
            cursor: pointer;
            border: 1px solid #3d6080;
            transition: all 0.06s ease;
            text-align: center;
        }
        .option-btn:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #0e1b28;
        }
        .option-btn.disabled {
            opacity: 0.4;
            transform: translateY(2px);
            box-shadow: 0 2px 0 #0e1b28;
            pointer-events: none;
        }
        .option-btn.enabled {
            background: #2d4f6e;
            border-color: #6ba6d9;
            color: #ffffff;
            cursor: pointer;
            opacity: 1;
        }
        .option-btn.enabled:hover {
            background: #3a6090;
            border-color: #f5b042;
        }
        .option-btn.correct {
            background: #4a9d5d !important;
            border-color: #6bdd7f !important;
            color: white !important;
        }
        .option-btn.wrong {
            background: #a94a4a !important;
            border-color: #d97a7a !important;
            color: white !important;
        }
        .buzz-area {
            margin: 12px 0 18px;
            padding: 14px 10px;
            background: #0f1f2f88;
            border-radius: 28px;
            border: 1px solid #2f4b66;
        }
        .buzz-title {
            text-align: center;
            color: #8ab3d9;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }
        .buzz-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }
        .buzz-btn {
            background: #1d344b;
            border: 2px solid #3a5a78;
            border-radius: 20px;
            padding: 16px 8px;
            font-weight: 800;
            font-size: 1.2rem;
            color: #6a8faf;
            cursor: not-allowed;
            transition: 0.15s;
            box-shadow: 0 4px 0 #0a1622;
            text-align: center;
            opacity: 0.5;
            user-select: none;
        }
        .buzz-btn.active {
            background: #2a4a6a;
            border-color: #6ba6d9;
            color: #e5f0ff;
            cursor: pointer;
            opacity: 1;
            box-shadow: 0 4px 0 #0f202f;
        }
        .buzz-btn.active:hover {
            background: #3a6090;
            border-color: #f5b042;
            transform: scale(1.02);
        }
        .buzz-btn.active:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #0f202f;
        }
        .buzz-btn.winner {
            background: #f5b042;
            border-color: #ffd966;
            color: #1a2f44;
            box-shadow: 0 0 30px #f5b04288;
            animation: pulse-glow 0.6s ease infinite alternate;
            opacity: 1;
        }
        @keyframes pulse-glow {
            from { box-shadow: 0 0 20px #f5b04255; }
            to { box-shadow: 0 0 50px #f5b042cc; }
        }
        .buzz-btn.locked {
            background: #1d2a3a;
            border-color: #2a3a4a;
            color: #4a5a6a;
            cursor: not-allowed;
            opacity: 0.4;
        }
        .buzz-btn .sub {
            font-size: 0.65rem;
            font-weight: 400;
            display: block;
            color: #8ab3d9;
        }
        .buzz-btn.winner .sub {
            color: #1a2f44;
        }
        .student-buzz-area {
            margin: 20px 0;
            padding: 20px;
            background: #0f1f2f88;
            border-radius: 28px;
            border: 2px solid #3a5a78;
        }
        .student-buzz-btn {
            width: 100%;
            padding: 30px;
            border-radius: 20px;
            font-size: 2rem;
            font-weight: 800;
            border: none;
            cursor: pointer;
            transition: all 0.1s;
            user-select: none;
        }
        .student-buzz-btn.inactive {
            background: #1d344b;
            color: #6a8faf;
            border: 3px solid #3a5a78;
            cursor: not-allowed;
        }
        .student-buzz-btn.active {
            background: linear-gradient(145deg, #e6a43a, #f5b042);
            color: #1a2f44;
            border: 3px solid #ffd966;
            box-shadow: 0 0 30px #f5b04266;
        }
        .student-buzz-btn.active:active {
            transform: scale(0.95);
        }
        .student-buzz-btn.winner {
            background: linear-gradient(145deg, #4a9d5d, #6bdd7f);
            border-color: #a8ffb8;
            animation: pulse-glow 0.6s ease infinite alternate;
        }
        .student-buzz-btn.locked {
            background: #1d2a3a;
            color: #4a5a6a;
            border-color: #2a3a4a;
            cursor: not-allowed;
        }
        .group-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(90px, 1fr));
            gap: 10px;
            margin: 12px 0 16px;
        }
        .group-card {
            background: #1f3851;
            border-radius: 28px;
            padding: 10px 6px;
            text-align: center;
            border: 1px solid #3f6383;
            box-shadow: 0 6px 0 #0d1f2f;
            color: #dceaf5;
            transition: 0.15s;
        }
        .group-card.active {
            border: 2px solid #fecb6e;
            background: #2d4f6e;
            box-shadow: 0 0 20px #f5b34255;
        }
        .group-card.selected {
            border: 2px solid #6ba6d9;
            background: #2a4a6a;
        }
        .group-name {
            font-weight: 700;
            font-size: 0.95rem;
        }
        .group-score {
            font-size: 1.6rem;
            font-weight: 800;
            color: #fadf9e;
            line-height: 1.2;
        }
        .group-streak {
            font-size: 0.65rem;
            background: #0d1f2f;
            display: inline-block;
            padding: 2px 10px;
            border-radius: 40px;
            color: #b3d6ff;
        }
        .control-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin: 16px 0 10px;
            justify-content: center;
        }
        .btn {
            background: #2c4b68;
            border: none;
            border-radius: 60px;
            padding: 12px 28px;
            font-weight: 700;
            color: white;
            font-size: 1rem;
            box-shadow: 0 6px 0 #0f202f;
            cursor: pointer;
            border: 1px solid #4a7297;
            flex: 1 1 auto;
            min-width: 110px;
            transition: 0.06s linear;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #0f202f;
        }
        .btn-primary {
            background: #e6a43a;
            border-color: #f5c76b;
            color: #1d2f3f;
            box-shadow: 0 6px 0 #8f641f;
        }
        .btn-danger {
            background: #b34a4a;
            border-color: #d97a7a;
            box-shadow: 0 6px 0 #712e2e;
        }
        .btn:disabled {
            opacity: 0.5;
            transform: translateY(2px);
            box-shadow: 0 3px 0 #0f202f;
            pointer-events: none;
        }
        .log-area {
            background: #0b1927cc;
            border-radius: 24px;
            padding: 16px;
            margin-top: 16px;
            font-size: 0.85rem;
            color: #b2cfec;
            border: 1px solid #2f4b66;
            max-height: 110px;
            overflow-y: auto;
            backdrop-filter: blur(2px);
        }
        .log-entry {
            padding: 4px 0;
            border-bottom: 1px solid #1f3853;
        }
        .highlight {
            color: #fedb87;
            font-weight: 600;
        }
        .punish-banner {
            background: #712e2ecc;
            border-radius: 60px;
            padding: 8px 16px;
            font-weight: 600;
            color: #ffd9b0;
            margin: 6px 0 10px;
            text-align: center;
            border-left: 6px solid #f57c7c;
            backdrop-filter: blur(2px);
            display: none;
        }
        .connection-status {
            text-align: center;
            font-size: 0.75rem;
            margin-bottom: 10px;
            padding: 4px 12px;
            border-radius: 40px;
            display: inline-block;
        }
        .connection-status.online {
            background: #2d5a3d;
            color: #8affa5;
        }
        .connection-status.offline {
            background: #5a2d2d;
            color: #ff8a8a;
        }
        .group-selector {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-bottom: 16px;
        }
        .group-select-btn {
            padding: 12px 20px;
            border-radius: 60px;
            border: 2px solid #3a5a78;
            background: #1d344b;
            color: #8ab3d9;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
            min-width: 70px;
        }
        .group-select-btn:hover {
            border-color: #6ba6d9;
        }
        .group-select-btn.selected {
            background: #6ba6d9;
            border-color: #f5b042;
            color: #1a2f44;
        }
        .student-info {
            text-align: center;
            color: #8ab3d9;
            font-size: 0.85rem;
            margin-bottom: 12px;
        }
        .student-info .selected-group {
            color: #f5b042;
            font-weight: 600;
            font-size: 1rem;
        }
        @media (max-width: 500px) {
            .question-text { font-size: 1.05rem; }
            .group-grid { grid-template-columns: repeat(3, 1fr); }
            .options { grid-template-columns: 1fr 1fr; }
            .buzz-grid { grid-template-columns: repeat(3, 1fr); }
            .buzz-btn { font-size: 0.95rem; padding: 12px 4px; }
            .student-buzz-btn { font-size: 1.5rem; padding: 20px; }
        }
        .footer {
            text-align: center;
            font-size: 0.7rem;
            color: #5b7b99;
            margin-top: 10px;
        }
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div id="connectionStatus" class="connection-status offline">🔴 未连接</div>

        <h1>
            ⚗️ 气相色谱快速抢答PK赛
            <small id="roleLabel">选择角色</small>
        </h1>

        <div class="role-switch">
            <button class="role-btn" id="teacherRoleBtn">👨‍🏫 教师</button>
            <button class="role-btn" id="studentRoleBtn">👨‍🎓 学生</button>
        </div>

        <div id="teacherView" class="hidden">
            <div class="status-bar">
                <div class="status-item">📌 题目 <span id="questionIndex">1/10</span></div>
                <div class="status-item">⏳ 倒计时 <span id="timerDisplay">5</span>s</div>
                <div class="status-item">🏆 抢答权 <span id="turnIndicator">⚪ 无</span></div>
            </div>

            <div class="question-panel">
                <div class="question-text" id="questionText">点击「开始答题」启动PK赛</div>
                <div class="options" id="optionsContainer">
                    <button class="option-btn disabled" data-index="0">A.</button>
                    <button class="option-btn disabled" data-index="1">B.</button>
                    <button class="option-btn disabled" data-index="2">C.</button>
                    <button class="option-btn disabled" data-index="3">D.</button>
                    <button class="option-btn disabled" data-index="4" style="display:none;">E.</button>
                </div>
            </div>

            <div class="buzz-area">
                <div class="buzz-title">⚡ 学生抢答状态 ⚡</div>
                <div class="buzz-grid" id="buzzGrid">
                    <button class="buzz-btn locked" data-group="0">A组 <span class="sub">抢!</span></button>
                    <button class="buzz-btn locked" data-group="1">B组 <span class="sub">抢!</span></button>
                    <button class="buzz-btn locked" data-group="2">C组 <span class="sub">抢!</span></button>
                    <button class="buzz-btn locked" data-group="3">D组 <span class="sub">抢!</span></button>
                    <button class="buzz-btn locked" data-group="4">E组 <span class="sub">抢!</span></button>
                    <button class="buzz-btn locked" data-group="5">F组 <span class="sub">抢!</span></button>
                </div>
            </div>

            <div class="group-grid" id="groupGrid"></div>

            <div id="punishBanner" class="punish-banner">⚠️ 惩罚：大喊“我再也不搞混载气了！”</div>

            <div class="control-bar">
                <button class="btn btn-primary" id="startRoundBtn">🚀 开始答题</button>
                <button class="btn btn-danger" id="resetGameBtn">🔄 重置</button>
            </div>

            <div class="log-area" id="logArea">
                <div class="log-entry">📢 欢迎！点击「开始答题」启动抢答</div>
            </div>
        </div>

        <div id="studentView" class="hidden">
            <div class="student-info">
                <div>当前身份：<span id="currentGroupDisplay" class="selected-group">-</span></div>
                <div id="roundStatus">等待教师开始...</div>
            </div>

            <div class="group-selector" id="groupSelector">
                <button class="group-select-btn" data-group="0">A组</button>
                <button class="group-select-btn" data-group="1">B组</button>
                <button class="group-select-btn" data-group="2">C组</button>
                <button class="group-select-btn" data-group="3">D组</button>
                <button class="group-select-btn" data-group="4">E组</button>
                <button class="group-select-btn" data-group="5">F组</button>
            </div>

            <div class="question-panel">
                <div class="question-text" id="studentQuestionText">等待题目...</div>
                <div class="options" id="studentOptionsContainer">
                    <button class="option-btn disabled" data-index="0">A.</button>
                    <button class="option-btn disabled" data-index="1">B.</button>
                    <button class="option-btn disabled" data-index="2">C.</button>
                    <button class="option-btn disabled" data-index="3">D.</button>
                    <button class="option-btn disabled" data-index="4" style="display:none;">E.</button>
                </div>
            </div>

            <div class="student-buzz-area">
                <button class="student-buzz-btn inactive" id="studentBuzzBtn">
                    ⏳ 等待抢答
                </button>
            </div>

            <div class="group-grid" id="studentGroupGrid"></div>

            <div class="log-area" id="studentLogArea">
                <div class="log-entry">📢 选择你的小组，等待教师开始答题</div>
            </div>
        </div>

        <div class="footer">🏅 获胜组获得「色谱快枪手」+ 虚拟进样器勋章</div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        (function() {
            const QUESTION_BANK = [{
                q: '气相色谱仪中实现食品样品各组分分离的核心关键部件为（  ）',
                options: ['A. 气化衬管', 'B. 色谱柱', 'C. FID检测器', 'D. 稳压阀', 'E. 柱温加热丝'],
                answer: 1,
                hasE: true
            }, {
                q: '下列组件中，不属于气相色谱气路净化装置的是（  ）',
                options: ['A. 除水分子筛管', 'B. 脱氧活性炭管', 'C. 除烃净化管', 'D. 分流平板', 'E. 气体过滤器'],
                answer: 3,
                hasE: true
            }, {
                q: '气化室衬管的主要作用是（  ）',
                options: ['A. 调节载气流速压力', 'B. 承接样品、防止高沸点残渣污染色谱柱', 'C. 对分离后的组分进行信号响应', 'D. 控制色谱柱程序升温速率', 'E. 储存高纯载气气源'],
                answer: 1,
                hasE: true
            }, {
                q: '气相色谱温控系统需独立控温的三个区域是（  ）',
                options: ['A. 钢瓶、净化器、色谱柱', 'B. 气化室、柱温箱、检测器', 'C. 分流阀、衬管、毛细管柱', 'D. 氢气路、空气路、载气路', 'E. 采集板、工作站、信号放大器'],
                answer: 1,
                hasE: true
            }, {
                q: '在食品气相检测中，氢火焰离子化检测器（FID）最适合测定下列哪一类物质（  ）',
                options: ['A. 有机氯农药、含卤素有机污染物', 'B. 含碳氢的有机化合物（油脂、醇类、农残、溶剂）', 'C. 永久性气体、无机气体（氢气、氧气、氮气）', 'D. 重金属元素、无机金属离子', 'E. 放射性卤素衍生物'],
                answer: 1,
                hasE: true
            }, {
                q: '气相色谱进样口隔垫（硅胶密封垫）的核心作用不包括（  ）',
                options: ['A. 穿刺进样时密封气化室，防止载气泄漏', 'B. 隔绝外部空气进入管路，避免氧气氧化色谱柱', 'C. 缓冲进样针穿刺，保护衬管与进样口内部结构', 'D. 吸附样品中高沸点杂质，净化待测组分', 'E. 维持气化室内稳定压力，保证分流效果稳定'],
                answer: 3,
                hasE: true
            }, {
                q: '气相色谱分析中，保留时间（tR）是指（  ）',
                options: ['A. 组分从进样到出现色谱峰最大值所需时间', 'B. 组分在固定相中停留的时间', 'C. 死时间', 'D. 组分从进样到开始出峰的时间', 'E. 色谱峰宽度'],
                answer: 0,
                hasE: true
            }, {
                q: '气相色谱法分离原理属于（  ）',
                options: ['A. 吸附色谱', 'B. 分配色谱', 'C. 离子交换色谱', 'D. 凝胶色谱', 'E. 亲和色谱'],
                answer: 1,
                hasE: true
            }, {
                q: '在气相色谱中，柱温升高，则（  ）',
                options: ['A. 保留时间增加', 'B. 保留时间减少', 'C. 色谱峰变宽', 'D. 分离度增加', 'E. 理论塔板数减少'],
                answer: 1,
                hasE: true
            }, {
                q: '气相色谱检测器中，属于通用型检测器的是（  ）',
                options: ['A. FID', 'B. ECD', 'C. TCD', 'D. FPD', 'E. NPD'],
                answer: 2,
                hasE: true
            }];

            let currentRole = null;
            let selectedGroupId = null;
            let socket = null;
            let lastLogCount = 0;

            const teacherView = document.getElementById('teacherView');
            const studentView = document.getElementById('studentView');
            const teacherRoleBtn = document.getElementById('teacherRoleBtn');
            const studentRoleBtn = document.getElementById('studentRoleBtn');
            const roleLabel = document.getElementById('roleLabel');
            const connectionStatus = document.getElementById('connectionStatus');

            const teacherElements = {
                questionText: document.getElementById('questionText'),
                optionsContainer: document.getElementById('optionsContainer'),
                groupGrid: document.getElementById('groupGrid'),
                buzzGrid: document.getElementById('buzzGrid'),
                timerDisplay: document.getElementById('timerDisplay'),
                turnIndicator: document.getElementById('turnIndicator'),
                logArea: document.getElementById('logArea'),
                punishBanner: document.getElementById('punishBanner'),
                questionIndexSpan: document.getElementById('questionIndex'),
                startBtn: document.getElementById('startRoundBtn'),
                resetBtn: document.getElementById('resetGameBtn'),
                buzzBtns: [],
                optionBtns: []
            };

            const studentElements = {
                currentGroupDisplay: document.getElementById('currentGroupDisplay'),
                roundStatus: document.getElementById('roundStatus'),
                groupSelector: document.getElementById('groupSelector'),
                questionText: document.getElementById('studentQuestionText'),
                optionsContainer: document.getElementById('studentOptionsContainer'),
                buzzBtn: document.getElementById('studentBuzzBtn'),
                groupGrid: document.getElementById('studentGroupGrid'),
                logArea: document.getElementById('studentLogArea'),
                groupSelectBtns: [],
                optionBtns: []
            };

            function setRole(role) {
                currentRole = role;
                teacherRoleBtn.classList.toggle('active', role === 'teacher');
                studentRoleBtn.classList.toggle('active', role === 'student');
                teacherView.classList.toggle('hidden', role !== 'teacher');
                studentView.classList.toggle('hidden', role !== 'student');
                roleLabel.textContent = role === 'teacher' ? '👨‍🏫 教师模式' : '👨‍🎓 学生模式';

                if (!socket) {
                    connectSocket();
                } else {
                    socket.emit('set_role', role);
                }
            }

            function connectSocket() {
                socket = io();

                socket.on('connect', () => {
                    connectionStatus.className = 'connection-status online';
                    connectionStatus.textContent = '🟢 已连接';
                    addLog('✅ 已连接到服务器');
                    if (currentRole) {
                        socket.emit('set_role', currentRole);
                    }
                });

                socket.on('disconnect', () => {
                    connectionStatus.className = 'connection-status offline';
                    connectionStatus.textContent = '🔴 连接断开';
                    addLog('❌ 与服务器断开连接', true);
                });

                socket.on('error', (err) => {
                    addLog(`❌ ${err.message}`, true);
                });

                socket.on('state_sync', (state) => {
                    handleStateSync(state);
                });

                socket.on('buzz_result', (result) => {
                    if (currentRole === 'student') {
                        if (!result.success) {
                            addLog(result.reason, true);
                        }
                    }
                });

                socket.on('answer_result', (result) => {
                    if (currentRole === 'student') {
                        if (!result.success) {
                            addLog(result.reason, true);
                        }
                    }
                });
            }

            function initTeacherElements() {
                teacherElements.buzzBtns = teacherElements.buzzGrid.querySelectorAll('.buzz-btn');
                teacherElements.optionBtns = teacherElements.optionsContainer.querySelectorAll('.option-btn');

                teacherElements.startBtn.addEventListener('click', () => {
                    if (socket) socket.emit('start_round');
                });

                teacherElements.resetBtn.addEventListener('click', () => {
                    if (socket) socket.emit('reset_game');
                });

                teacherElements.optionsContainer.addEventListener('click', (e) => {
                    const btn = e.target.closest('.option-btn');
                    if (!btn) return;
                });
            }

            function initStudentElements() {
                studentElements.groupSelectBtns = studentElements.groupSelector.querySelectorAll('.group-select-btn');
                studentElements.optionBtns = studentElements.optionsContainer.querySelectorAll('.option-btn');

                studentElements.groupSelectBtns.forEach(btn => {
                    btn.addEventListener('click', () => {
                        const gId = parseInt(btn.dataset.group, 10);
                        selectGroup(gId);
                    });
                });

                studentElements.buzzBtn.addEventListener('click', () => {
                    if (selectedGroupId === null) {
                        addLog('⚠️ 请先选择小组', true);
                        return;
                    }
                    if (socket) socket.emit('buzz', selectedGroupId);
                });

                studentElements.optionsContainer.addEventListener('click', (e) => {
                    const btn = e.target.closest('.option-btn');
                    if (!btn) return;
                    if (selectedGroupId === null) {
                        addLog('⚠️ 请先选择小组', true);
                        return;
                    }
                    const selectedIdx = parseInt(btn.dataset.index, 10);
                    if (socket) socket.emit('answer', { groupId: selectedGroupId, selectedIdx });
                });
            }

            function selectGroup(groupId) {
                selectedGroupId = groupId;
                const groupNames = ['A组', 'B组', 'C组', 'D组', 'E组', 'F组'];
                studentElements.currentGroupDisplay.textContent = groupNames[groupId];

                studentElements.groupSelectBtns.forEach(btn => {
                    btn.classList.toggle('selected', parseInt(btn.dataset.group) === groupId);
                });

                if (socket) socket.emit('join', groupId);
                addLog(`👤 已加入 ${groupNames[groupId]}`);
            }

            function addLog(msg, highlight = false) {
                const logArea = currentRole === 'teacher' ? teacherElements.logArea : studentElements.logArea;
                const entry = document.createElement('div');
                entry.className = 'log-entry';
                if (highlight) entry.innerHTML = `<span class="highlight">${msg}</span>`;
                else entry.textContent = msg;
                logArea.appendChild(entry);
                logArea.scrollTop = logArea.scrollHeight;
                if (logArea.children.length > 50) logArea.removeChild(logArea.firstChild);
            }

            function handleStateSync(state) {
                if (currentRole === 'teacher') {
                    updateTeacherView(state);
                } else if (currentRole === 'student') {
                    updateStudentView(state);
                }
            }

            function updateTeacherView(state) {
                const q = QUESTION_BANK[state.currentQuestionIndex];

                if (!q) {
                    teacherElements.questionText.textContent = '🏁 所有题目已完成！点击重置继续。';
                    teacherElements.optionBtns.forEach((btn, i) => {
                        btn.textContent = ['A', 'B', 'C', 'D', 'E'][i] + '. —';
                        btn.style.display = 'none';
                    });
                } else {
                    teacherElements.questionText.textContent = q.q;
                    teacherElements.optionBtns.forEach((btn, i) => {
                        if (i < q.options.length) {
                            btn.textContent = q.options[i];
                            btn.style.display = '';
                            btn.dataset.index = i;
                        } else {
                            btn.style.display = 'none';
                        }
                    });
                    if (!q.hasE) {
                        teacherElements.optionBtns.forEach(btn => {
                            if (btn.dataset.index == 4) btn.style.display = 'none';
                        });
                    } else {
                        teacherElements.optionBtns.forEach(btn => {
                            if (btn.dataset.index == 4) btn.style.display = '';
                        });
                    }
                }

                teacherElements.questionIndexSpan.textContent = `${state.currentQuestionIndex + 1}/${QUESTION_BANK.length}`;
                teacherElements.timerDisplay.textContent = state.timer;
                teacherElements.startBtn.disabled = state.roundState === 'countdown' || state.roundState === 'buzzing' || state.roundState === 'answering';

                if (state.buzzGroupId !== null) {
                    const group = state.groups.find(g => g.id === state.buzzGroupId);
                    teacherElements.turnIndicator.textContent = group ? `🏃 ${group.name} 抢答` : '⚪ 无';
                } else if (state.roundState === 'countdown') {
                    teacherElements.turnIndicator.textContent = '⏳ 倒计时';
                } else if (state.roundState === 'buzzing') {
                    teacherElements.turnIndicator.textContent = '🟢 点击抢答!';
                } else if (state.roundState === 'answered') {
                    teacherElements.turnIndicator.textContent = '✅ 已答';
                } else {
                    teacherElements.turnIndicator.textContent = '⚪ 无';
                }

                teacherElements.buzzBtns.forEach(btn => {
                    const gId = parseInt(btn.dataset.group, 10);
                    btn.classList.remove('active', 'winner', 'locked');
                    if (state.roundState === 'idle' || state.roundState === 'countdown') {
                        btn.classList.add('locked');
                    } else if (state.roundState === 'buzzing') {
                        btn.classList.add('active');
                    } else if (state.roundState === 'answering' || state.roundState === 'answered') {
                        if (state.buzzGroupId === gId) {
                            btn.classList.add('winner');
                        } else {
                            btn.classList.add('locked');
                        }
                    } else {
                        btn.classList.add('locked');
                    }
                });

                teacherElements.optionBtns.forEach(btn => {
                    btn.classList.remove('enabled', 'disabled', 'correct', 'wrong');
                    if (state.roundState === 'answering' && state.buzzGroupId !== null) {
                        btn.classList.add('enabled');
                    } else if (state.roundState === 'answered' && state.lastAnswerResult) {
                        btn.classList.add('disabled');
                        const idx = parseInt(btn.dataset.index, 10);
                        if (idx === state.lastAnswerResult.correctAnswer) {
                            btn.classList.add('correct');
                        } else if (idx === state.lastAnswerResult.selectedIdx && !state.lastAnswerResult.correct) {
                            btn.classList.add('wrong');
                        }
                    } else {
                        btn.classList.add('disabled');
                    }
                });

                renderGroupGrid(state.groups, teacherElements.groupGrid, state.buzzGroupId);

                if (state.logs.length > lastLogCount) {
                    for (let i = lastLogCount; i < state.logs.length; i++) {
                        addLog(state.logs[i].msg, state.logs[i].highlight);
                    }
                    lastLogCount = state.logs.length;
                }
            }

            function updateStudentView(state) {
                const q = QUESTION_BANK[state.currentQuestionIndex];

                if (!q) {
                    studentElements.questionText.textContent = '🏁 所有题目已完成！';
                    studentElements.optionBtns.forEach((btn, i) => {
                        btn.textContent = ['A', 'B', 'C', 'D', 'E'][i] + '. —';
                        btn.style.display = 'none';
                    });
                } else {
                    studentElements.questionText.textContent = q.q;
                    studentElements.optionBtns.forEach((btn, i) => {
                        if (i < q.options.length) {
                            btn.textContent = q.options[i];
                            btn.style.display = '';
                            btn.dataset.index = i;
                        } else {
                            btn.style.display = 'none';
                        }
                    });
                    if (!q.hasE) {
                        studentElements.optionBtns.forEach(btn => {
                            if (btn.dataset.index == 4) btn.style.display = 'none';
                        });
                    } else {
                        studentElements.optionBtns.forEach(btn => {
                            if (btn.dataset.index == 4) btn.style.display = '';
                        });
                    }
                }

                const buzzBtn = studentElements.buzzBtn;
                buzzBtn.classList.remove('inactive', 'active', 'winner', 'locked');

                if (state.roundState === 'idle') {
                    buzzBtn.textContent = '⏳ 等待开始';
                    buzzBtn.classList.add('inactive');
                    studentElements.roundStatus.textContent = '等待教师开始答题...';
                } else if (state.roundState === 'countdown') {
                    buzzBtn.textContent = `⏳ 倒计时 ${state.timer}s`;
                    buzzBtn.classList.add('inactive');
                    studentElements.roundStatus.textContent = `倒计时中... ${state.timer}秒后开始抢答`;
                } else if (state.roundState === 'buzzing') {
                    buzzBtn.textContent = '⚡ 点击抢答 ⚡';
                    buzzBtn.classList.add('active');
                    studentElements.roundStatus.textContent = '快点击按钮抢答！';
                } else if (state.roundState === 'answering') {
                    if (state.buzzGroupId === selectedGroupId) {
                        buzzBtn.textContent = `⏰ ${state.timer}s 答题中`;
                        buzzBtn.classList.add('winner');
                        studentElements.roundStatus.textContent = `你抢到了！请在 ${state.timer} 秒内选择答案`;
                    } else {
                        const group = state.groups.find(g => g.id === state.buzzGroupId);
                        buzzBtn.textContent = group ? `👎 ${group.name} 抢到了` : '👎 已被抢';
                        buzzBtn.classList.add('locked');
                        studentElements.roundStatus.textContent = group ? `${group.name} 抢到了答题权` : '已被其他组抢答';
                    }
                } else if (state.roundState === 'answered') {
                    if (state.lastAnswerResult) {
                        buzzBtn.textContent = state.lastAnswerResult.correct ? '✅ 回答正确！' : '❌ 回答错误';
                    } else {
                        buzzBtn.textContent = '⏭️ 等待下一题';
                    }
                    buzzBtn.classList.add('locked');
                    studentElements.roundStatus.textContent = '等待下一题...';
                }

                studentElements.optionBtns.forEach(btn => {
                    btn.classList.remove('enabled', 'disabled', 'correct', 'wrong');
                    if (state.roundState === 'answering' && state.buzzGroupId === selectedGroupId) {
                        btn.classList.add('enabled');
                    } else if (state.roundState === 'answered' && state.lastAnswerResult) {
                        btn.classList.add('disabled');
                        const idx = parseInt(btn.dataset.index, 10);
                        if (idx === state.lastAnswerResult.correctAnswer) {
                            btn.classList.add('correct');
                        } else if (idx === state.lastAnswerResult.selectedIdx && !state.lastAnswerResult.correct) {
                            btn.classList.add('wrong');
                        }
                    } else {
                        btn.classList.add('disabled');
                    }
                });

                renderGroupGrid(state.groups, studentElements.groupGrid, state.buzzGroupId);

                if (state.logs.length > lastLogCount) {
                    for (let i = lastLogCount; i < state.logs.length; i++) {
                        addLog(state.logs[i].msg, state.logs[i].highlight);
                    }
                    lastLogCount = state.logs.length;
                }
            }

            function renderGroupGrid(groups, container, activeGroupId) {
                container.innerHTML = '';
                groups.forEach(g => {
                    const card = document.createElement('div');
                    card.className = 'group-card' + (activeGroupId === g.id ? ' active' : '') + (selectedGroupId === g.id && currentRole === 'student' ? ' selected' : '');
                    card.innerHTML = `
                        <div class="group-name">${g.name}</div>
                        <div class="group-score">${g.score}</div>
                        <div class="group-streak">🔥 ${g.streak} 连击</div>
                    `;
                    container.appendChild(card);
                });
            }

            initTeacherElements();
            initStudentElements();

            teacherRoleBtn.addEventListener('click', () => setRole('teacher'));
            studentRoleBtn.addEventListener('click', () => setRole('student'));

            addLog('📋 请选择你的角色开始');
        })();
    </script>
</body>
</html>
